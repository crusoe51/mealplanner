version: '3.8'

# Fix-Version mit expliziter API-URL
# Verwendung: docker compose -f docker-compose.fix.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mealplanner-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - FLASK_ENV=production
    networks:
      - mealplanner-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://192.168.178.65:5000/api
    container_name: mealplanner-frontend
    restart: unless-stopped
    ports:
      - "8086:80"
    depends_on:
      - backend
    networks:
      - mealplanner-network

networks:
  mealplanner-network:
    driver: bridge

