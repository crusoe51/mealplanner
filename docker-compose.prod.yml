version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mealplanner-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - FLASK_ENV=production
    networks:
      - mealplanner-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # API URL zur Build-Zeit setzen - IP-Adresse des Raspberry Pi anpassen!
        - VITE_API_URL=http://192.168.1.100:5000/api
    container_name: mealplanner-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mealplanner-network

networks:
  mealplanner-network:
    driver: bridge

