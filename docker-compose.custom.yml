version: '3.8'

# Beispiel-Konfiguration mit benutzerdefinierten Ports
# Kopiere diese Datei und passe die Ports an deine Bedürfnisse an
# Verwendung: docker compose -f docker-compose.custom.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mealplanner-backend
    restart: unless-stopped
    ports:
      - "5001:5000"  # Backend auf Port 5001 (statt 5000)
    volumes:
      - ./backend/data:/app/data
    environment:
      - FLASK_ENV=production
    networks:
      - mealplanner-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # WICHTIG: API URL anpassen, wenn Backend-Port geändert wurde!
        - VITE_API_URL=http://localhost:5001/api
    container_name: mealplanner-frontend
    restart: unless-stopped
    ports:
      - "8086:80"  # Frontend auf Port 8080 (statt 80)
    depends_on:
      - backend
    networks:
      - mealplanner-network

networks:
  mealplanner-network:
    driver: bridge

